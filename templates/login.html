<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Spendly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'Inter', sans-serif;
  --color-bg:            #0d0e11;
  --color-surface:       #13151a;
  --color-surface-2:     #191c22;
  --color-border:        #2a2e38;
  --color-border-focus:  rgba(108,142,255,0.5);
  --color-text:          #e8eaf0;
  --color-muted:         #8b90a0;
  --color-faint:         #4a4f5e;
  --color-primary:       #6c8eff;
  --color-primary-hover: #8aa4ff;
  --color-primary-glow:  rgba(108,142,255,0.18);
  --color-accent:        #38d9a9;
  --color-error:         #ff6b6b;
  --color-error-bg:      rgba(255,107,107,0.1);
  --color-success:       #38d9a9;
  --color-success-bg:    rgba(56,217,169,0.1);
  --radius-md: 0.5rem;
  --radius-xl: 1rem;
  --radius-full: 9999px;
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
}

html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

body {
  min-height: 100dvh;
  font-family: var(--font-body);
  background: var(--color-bg);
  color: var(--color-text);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  overflow-x: hidden;
}

/* ---- BACKGROUND ---- */
.bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.bg__orb {
  position: absolute; border-radius: 50%;
  filter: blur(90px); opacity: 0.25;
}
.bg__orb--1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(108,142,255,0.7), transparent 70%);
  top: -160px; left: -120px;
  animation: float 9s ease-in-out infinite;
}
.bg__orb--2 {
  width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(56,217,169,0.6), transparent 70%);
  bottom: -100px; right: 0;
  animation: float 9s ease-in-out infinite;
  animation-delay: -4.5s;
}
.bg__grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(108,142,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(108,142,255,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-28px); }
}

/* ---- BRAND ---- */
.brand {
  position: relative; z-index: 1;
  display: flex; align-items: center; gap: 0.5rem;
  text-decoration: none; color: var(--color-text);
  margin-bottom: 2rem;
}
.brand-name {
  font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em;
  background: linear-gradient(135deg, #e8eaf0 30%, var(--color-primary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

/* ---- CARD ---- */
.card {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  background: rgba(19, 21, 26, 0.7);
  border: 1px solid rgba(42, 46, 56, 0.8);
  border-radius: var(--radius-xl);
  padding: 2.25rem 2rem;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(108,142,255,0.04);
  animation: card-in 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card__header { margin-bottom: 1.75rem; }
.card__title {
  font-family: var(--font-display);
  font-size: clamp(1.5rem, 4vw, 1.9rem);
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin-bottom: 0.4rem;
}
.card__title em {
  font-style: italic;
  background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.card__sub { font-size: 0.875rem; color: var(--color-muted); line-height: 1.5; }

/* ---- FORM ---- */
.form { display: flex; flex-direction: column; gap: 1rem; }

.field { display: flex; flex-direction: column; gap: 0.4rem; }
.field__label { font-size: 0.8125rem; font-weight: 500; color: var(--color-muted); letter-spacing: 0.01em; }
.field__wrap { position: relative; }
.field__icon {
  position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%);
  color: var(--color-faint); pointer-events: none;
  display: flex; align-items: center;
  transition: color var(--transition);
}
.field__wrap:focus-within .field__icon { color: var(--color-primary); }
.field__input {
  width: 100%;
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text);
  font-family: var(--font-body);
  font-size: 0.9375rem;
  padding: 0.7rem 0.875rem 0.7rem 2.6rem;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
  -webkit-appearance: none;
}
.field__input::placeholder { color: var(--color-faint); }
.field__input:hover { border-color: rgba(108,142,255,0.25); }
.field__input:focus {
  border-color: var(--color-border-focus);
  box-shadow: 0 0 0 3px rgba(108,142,255,0.1);
  background: var(--color-surface);
}
.field__input.error  { border-color: var(--color-error);  box-shadow: 0 0 0 3px rgba(255,107,107,0.1); }
.field__input.success { border-color: rgba(56,217,169,0.4); }
.field__input.has-toggle { padding-right: 2.5rem; }

.field__toggle {
  position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--color-faint); padding: 0.25rem;
  display: flex; align-items: center;
  transition: color var(--transition);
}
.field__toggle:hover { color: var(--color-muted); }

.field__error {
  font-size: 0.75rem; color: var(--color-error);
  display: none; align-items: center; gap: 0.3rem;
  animation: err-in 0.2s ease both;
}
.field__error.visible { display: flex; }
@keyframes err-in { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

/* ---- ALERTS ---- */
.alert {
  display: none; align-items: flex-start; gap: 0.6rem;
  padding: 0.8rem 1rem;
  border-radius: var(--radius-md);
  font-size: 0.8125rem; line-height: 1.5;
  border: 1px solid transparent;
  animation: alert-in 0.25s ease both;
}
.alert.visible { display: flex; }
@keyframes alert-in { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }
.alert--error   { background: var(--color-error-bg);   border-color: rgba(255,107,107,0.25); color: #ff9e9e; }
.alert--success { background: var(--color-success-bg); border-color: rgba(56,217,169,0.25);  color: #6ef0d1; }
.alert svg { flex-shrink: 0; margin-top: 1px; }

/* ---- SUBMIT BUTTON ---- */
.btn-submit {
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  width: 100%;
  padding: 0.8rem 1.5rem;
  margin-top: 0.25rem;
  background: var(--color-primary);
  color: #0d0e11;
  font-family: var(--font-body);
  font-size: 0.9375rem; font-weight: 600;
  border: none; border-radius: var(--radius-full);
  cursor: pointer;
  box-shadow: 0 0 20px var(--color-primary-glow);
  transition: all var(--transition);
  position: relative; overflow: hidden;
}
.btn-submit::before {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,255,0.08);
  opacity: 0; transition: opacity var(--transition);
}
.btn-submit:hover:not(:disabled)::before { opacity: 1; }
.btn-submit:hover:not(:disabled) {
  background: var(--color-primary-hover);
  box-shadow: 0 0 32px rgba(108,142,255,0.35);
  transform: translateY(-1px);
}
.btn-submit:active:not(:disabled) { transform: scale(0.98); }
.btn-submit:disabled { opacity: 0.65; cursor: not-allowed; transform: none !important; }

.spinner {
  width: 17px; height: 17px;
  border: 2px solid rgba(13,14,17,0.3);
  border-top-color: #0d0e11;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- DIVIDER ---- */
.divider {
  display: flex; align-items: center; gap: 0.75rem;
  margin: 0.25rem 0;
  color: var(--color-faint); font-size: 0.75rem;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--color-border); }

/* ---- FOOTER ---- */
.card__footer {
  margin-top: 1.25rem; text-align: center;
  font-size: 0.8125rem; color: var(--color-muted);
}
.card__footer a {
  color: var(--color-primary); text-decoration: none;
  font-weight: 500; transition: color var(--transition);
}
.card__footer a:hover { color: var(--color-primary-hover); text-decoration: underline; }

/* ---- BACK LINK ---- */
.back-link {
  position: relative; z-index: 1;
  display: inline-flex; align-items: center; gap: 0.4rem;
  margin-top: 1.5rem;
  font-size: 0.8125rem; color: var(--color-faint);
  text-decoration: none; transition: color var(--transition);
}
.back-link:hover { color: var(--color-muted); }

/* ---- RESPONSIVE ---- */
@media (max-width: 480px) { .card { padding: 1.75rem 1.25rem; } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="bg" aria-hidden="true">
  <div class="bg__grid"></div>
  <div class="bg__orb bg__orb--1"></div>
  <div class="bg__orb bg__orb--2"></div>
</div>

<!-- Brand -->
<a href="/" class="brand" aria-label="Spendly home">
  <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true">
    <rect width="32" height="32" rx="8" fill="url(#lg1)"/>
    <path d="M16 7c0 0-6 3.5-6 9.5 0 3 2.5 5.5 5.5 5.5h1c3 0 5.5-2.5 5.5-5.5C22 10.5 16 7 16 7z" fill="white" opacity="0.9"/>
    <path d="M16 12c0 0-3.5 2.2-3.5 4.8 0 1.8 1.6 3.2 3.4 3.2h.2c1.8 0 3.4-1.4 3.4-3.2C19.5 14.2 16 12 16 12z" fill="url(#lg2)"/>
    <defs>
      <linearGradient id="lg1" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
        <stop stop-color="#6c8eff"/><stop offset="1" stop-color="#38d9a9"/>
      </linearGradient>
      <linearGradient id="lg2" x1="12" y1="12" x2="20" y2="22" gradientUnits="userSpaceOnUse">
        <stop stop-color="#6c8eff"/><stop offset="1" stop-color="#38d9a9"/>
      </linearGradient>
    </defs>
  </svg>
  <span class="brand-name">Spendly</span>
</a>

<!-- Card -->
<div class="card" role="main">
  <div class="card__header">
    <h1 class="card__title">Welcome <em>back</em></h1>
    <p class="card__sub">Login to your account and pick up where you left off.</p>
  </div>

  <!-- Alerts -->
  <div class="alert alert--error" id="alert-error" role="alert" aria-live="polite">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="alert-error-msg"></span>
  </div>
  <div class="alert alert--success" id="alert-success" role="status" aria-live="polite">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 6L9 17l-5-5"/></svg>
    <span>Login successful! Redirecting to dashboard&hellip;</span>
  </div>

  <form class="form" id="login-form" novalidate aria-label="Login form">

    <!-- Email -->
    <div class="field">
      <label class="field__label" for="email">Email address</label>
      <div class="field__wrap">
        <input class="field__input" type="email" id="email" name="email"
          placeholder="you@example.com" autocomplete="email" spellcheck="false"
          aria-describedby="email-error" required>
        <span class="field__icon" aria-hidden="true">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </span>
      </div>
      <span class="field__error" id="email-error" aria-live="polite">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span></span>
      </span>
    </div>

    <!-- Password -->
    <div class="field">
      <label class="field__label" for="password">Password</label>
      <div class="field__wrap">
        <input class="field__input has-toggle" type="password" id="password" name="password"
          placeholder="Enter your password" autocomplete="current-password"
          aria-describedby="password-error" required>
        <span class="field__icon" aria-hidden="true">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </span>
        <button type="button" class="field__toggle" id="toggle-password" aria-label="Show password" tabindex="-1">
          <svg id="eye-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <span class="field__error" id="password-error" aria-live="polite">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span></span>
      </span>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn-submit" id="submit-btn">
      <span id="btn-label">Login</span>
    </button>

  </form>

  <div class="divider">or</div>

  <div class="card__footer">
    Don&rsquo;t have an account? <a href="/signup">Sign up free</a>
  </div>
</div>

<!-- Back link -->
<a href="/" class="back-link" aria-label="Back to home">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  Back to home
</a>

<script>
(function () {
  const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  // ---- HELPERS ----
  function showFieldError(inputId, errorId, msg) {
    const input = document.getElementById(inputId);
    const errEl = document.getElementById(errorId);
    input.classList.add('error');
    input.classList.remove('success');
    errEl.querySelector('span').textContent = msg;
    errEl.classList.add('visible');
    input.setAttribute('aria-invalid', 'true');
  }

  function clearFieldError(inputId, errorId) {
    const input = document.getElementById(inputId);
    const errEl = document.getElementById(errorId);
    input.classList.remove('error');
    errEl.classList.remove('visible');
    input.removeAttribute('aria-invalid');
  }

  function markSuccess(inputId) {
    const input = document.getElementById(inputId);
    input.classList.remove('error');
    input.classList.add('success');
  }

  function showAlert(type, msg) {
    document.getElementById('alert-error').classList.remove('visible');
    document.getElementById('alert-success').classList.remove('visible');
    if (type === 'error') {
      document.getElementById('alert-error-msg').textContent = msg;
      document.getElementById('alert-error').classList.add('visible');
    } else {
      document.getElementById('alert-success').classList.add('visible');
    }
  }

  function setLoading(on) {
    const btn = document.getElementById('submit-btn');
    btn.disabled = on;
    btn.innerHTML = on
      ? '<div class="spinner" aria-hidden="true"></div><span>Logging in&hellip;</span>'
      : '<span id="btn-label">Login</span>';
  }

  // ---- PASSWORD TOGGLE ----
  document.getElementById('toggle-password').addEventListener('click', function () {
    const input = document.getElementById('password');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    this.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    document.getElementById('eye-icon').innerHTML = isHidden
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  // ---- BLUR VALIDATION ----
  document.getElementById('email').addEventListener('blur', function () {
    const val = this.value.trim();
    if (!val) showFieldError('email', 'email-error', 'Email is required.');
    else if (!emailRe.test(val)) showFieldError('email', 'email-error', 'Enter a valid email address.');
    else { clearFieldError('email', 'email-error'); markSuccess('email'); }
  });

  document.getElementById('password').addEventListener('blur', function () {
    const val = this.value;
    if (!val) showFieldError('password', 'password-error', 'Password is required.');
    else { clearFieldError('password', 'password-error'); markSuccess('password'); }
  });

  // ---- FORM SUBMIT ----
  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();

    document.getElementById('alert-error').classList.remove('visible');
    document.getElementById('alert-success').classList.remove('visible');

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    let valid = true;

    if (!email) { showFieldError('email', 'email-error', 'Email is required.'); valid = false; }
    else if (!emailRe.test(email)) { showFieldError('email', 'email-error', 'Enter a valid email address.'); valid = false; }
    else clearFieldError('email', 'email-error');

    if (!password) { showFieldError('password', 'password-error', 'Password is required.'); valid = false; }
    else clearFieldError('password', 'password-error');

    if (!valid) return;

    setLoading(true);

    try {
      const response = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (response.ok) {
        showAlert('success');
        setTimeout(function () { window.location.href = '/dashboard'; }, 1000);
      } else {
        const msg = data.detail
          ? (typeof data.detail === 'string' ? data.detail : data.detail[0]?.msg || 'Login failed.')
          : 'Invalid credentials. Please try again.';
        showAlert('error', msg);
        setLoading(false);
      }
    } catch (err) {
      showAlert('error', 'Network error. Please check your connection and try again.');
      setLoading(false);
    }
  });
})();
</script>
</body>
</html>
